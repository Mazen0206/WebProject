<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zento - Home Feed</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <div class="page-layout">

        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="../../assets/images/zento_logo.png" alt="Zento">
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-link active"><span class="nav-icon">🏠</span><span class="nav-text">Home</span></a>
                <a href="../profile/profile.html" class="nav-link"><span class="nav-icon">👤</span><span class="nav-text">Profile</span></a>
                <button id="logout-btn" class="nav-link nav-logout"><span class="nav-icon">🚪</span><span class="nav-text">Logout</span></button>
            </nav>
        </aside>

        <!-- Main Feed -->
        <main class="feed">
            <h2>Home Feed</h2>

            <!-- Compose Box -->
            <div class="compose-box compose-box--expanded">
                <img id="compose-avatar" src="" alt="me" class="avatar-img">
                <div class="compose-body">
                    <input id="compose-input" type="text" placeholder="What's on your mind?" maxlength="280">
                    <img id="compose-img-preview" class="compose-img-preview" style="display:none;" alt="Image preview">
                    <div class="compose-actions">
                        <label for="compose-image-file" class="compose-img-btn" title="Add photo">📷 Photo</label>
                        <input type="file" id="compose-image-file" accept="image/*" style="display:none;">
                        <button id="compose-img-remove" class="compose-img-remove" style="display:none;">✕ Remove</button>
                        <button id="compose-btn" class="btn-primary compose-post-btn">Post</button>
                    </div>
                </div>
            </div>

            <div id="posts-container"></div>
        </main>

        <!-- Right Sidebar -->
        <aside class="right-sidebar">

            <!-- Suggestions -->
            <section class="widget">
                <h3>Suggestions</h3>
                <div id="suggestions-container" class="scrollable-widget">
                    <!-- Users will be injected here by JS -->
                </div>
            </section>

            <!-- Notes -->
            <section class="widget">
                <h3>Notes</h3>

                <div class="user-row">
                    <img src="../../assets/users pfp/user-maro.jpg" alt="maro" class="avatar-img">
                    <div class="user-info">
                        <span class="user-name">Maro</span>
                        <span class="user-handle">Just deployed my project 🚀</span>
                    </div>
                </div>

                <div class="user-row">
                    <img src="../../assets/users pfp/user-sara.jpg" alt="sara" class="avatar-img">
                    <div class="user-info">
                        <span class="user-name">Sara</span>
                        <span class="user-handle">Reading a great book today 📚</span>
                    </div>
                </div>

                <div class="user-row">
                    <img src="../../assets/users pfp/user-arabic2.jpg" alt="user" class="avatar-img">
                    <div class="user-info">
                        <span class="user-name">Omar</span>
                        <span class="user-handle">Morning run done. Feeling great!</span>
                    </div>
                </div>
            </section>

        </aside>

    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-nav">
                <a href="#" class="footer-link active">Home</a>
                <a href="../profile/profile.html" class="footer-link">Profile</a>
            </div>
            <p class="footer-copy">&copy; 2026 Zento. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="home.js"></script>
</body>
</html>
