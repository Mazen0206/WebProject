<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zento - Home Feed</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <div class="page-layout">

        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="../../assets/images/zento_logo.png" alt="Zento">
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link active"><span class="nav-text">Home</span></a>
                <a href="../profile/profile.html" class="nav-link"><span class="nav-text">Profile</span></a>
                <a href="/statistics" class="nav-link"><span class="nav-text">Statistics</span></a>
                <button id="logout-btn" class="nav-link nav-logout"><span class="nav-text">Logout</span></button>
            </nav>
        </aside>

        <main class="feed">
            <h2>Home Feed</h2>

            <div class="compose-box compose-box--expanded">
                <img id="compose-avatar" src="" alt="me" class="avatar-img">
                <div class="compose-body">
                    <input id="compose-input" type="text" placeholder="What's on your mind?" maxlength="280">
                    <img id="compose-img-preview" class="compose-img-preview" style="display:none;" alt="Image preview">
                    <div class="compose-actions">
                        <label for="compose-image-file" class="compose-img-btn" title="Add photo">📷 Photo</label>
                        <input type="file" id="compose-image-file" accept="image/*" style="display:none;">
                        <button id="compose-img-remove" class="compose-img-remove" style="display:none;">✕ Remove</button>
                        <button id="compose-btn" class="btn-primary compose-post-btn">Post</button>
                    </div>
                </div>
            </div>

            <div id="posts-container"></div>
        </main>

        <aside class="right-sidebar">

            <section class="widget">
                <h3>Find People</h3>
                <div class="search-widget">
                    <input id="user-search-input" type="text" placeholder="Search by username..." class="user-search-input" autocomplete="off">
                    <div id="user-search-results" class="user-search-results"></div>
                </div>
            </section>

            <section class="widget" id="suggestions-widget">
                <h3>Suggested for you</h3>
                <div id="suggestions-container" class="suggestions-list"></div>
            </section>

        </aside>

    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-nav">
                <a href="index.html" class="footer-link active">Home</a>
                <a href="../profile/profile.html" class="footer-link">Profile</a>
                <a href="/statistics" class="footer-link">Statistics</a>
            </div>
            <p class="footer-copy">&copy; 2026 Zento. All rights reserved.</p>
        </div>
    </footer>

    <div id="post-modal" class="post-modal-overlay" style="display:none;" role="dialog" aria-modal="true">
        <div class="post-modal-box">
            <button id="post-modal-close" class="post-modal-close" aria-label="Close">✕</button>
            <div id="post-modal-content"></div>
        </div>
    </div>

    <script type="module" src="home.js"></script>
</body>
</html>
